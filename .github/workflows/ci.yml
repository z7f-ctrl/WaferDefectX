name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data (if missing)
        run: |
          if ! ls data/synthetic/*.png >/dev/null 2>&1; then
            PYTHONPATH=python python python/data_generator.py
          fi

      - name: Unit tests
        run: PYTHONPATH=python python -m pytest tests -q

      - name: Python demo smoke
        run: PYTHONPATH=python python python/main.py

  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCV (dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libopencv-dev

      - name: Configure & build
        run: |
          cmake -S cpp -B cpp/build
          cmake --build cpp/build

      - name: Ensure sample image
        run: |
          if ! ls data/synthetic/*.png >/dev/null 2>&1; then
            sudo apt-get install -y python3-opencv python3-numpy || true
            pip3 install opencv-python-headless numpy
            PYTHONPATH=python python3 python/data_generator.py
          fi

      - name: Run C++ CLI
        run: |
          SAMPLE=$(ls data/synthetic/*.png | head -n 1)
          ./cpp/build/WaferDefectX_Run "$SAMPLE"
